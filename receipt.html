<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Ali's Barista POV</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .receipt-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        .paper-receipt {
            background: #fdfdfd;
            border: 1px solid #eee;
            padding: 30px 20px;
            font-family: 'Courier New', Courier, monospace;
            text-align: left;
            position: relative;
        }
        /* Perforated edge effect */
        .paper-receipt::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(-45deg, transparent 5px, #fdfdfd 5px), 
                        linear-gradient(45deg, transparent 5px, #fdfdfd 5px);
            background-size: 10px 10px;
        }
        .receipt-line { border-bottom: 1px dashed #ccc; margin: 10px 0; }
        .total-row { font-weight: bold; font-size: 1.2rem; text-align: right; margin-top: 15px; }
        .back-btn {
            margin-top: 40px;
            display: inline-block;
            padding: 12px 25px;
            background: #6f4e37;
            color: white;
            text-decoration: none;
            border-radius: 25px;
        }
    </style>
</head>
<body>
    <div class="receipt-container">
        <div style="font-size: 3rem; margin-bottom: 10px;">✅</div>
        <h2 style="margin-bottom: 30px;">Order Received!</h2>

        <div class="paper-receipt">
            <div style="text-align: center;">
                <strong>ALI'S BARISTA POV</strong><br>
                <small id="r-date"></small>
            </div>
            
            <div class="receipt-line"></div>
            
            <div id="r-items" style="white-space: pre-wrap; font-size: 0.9rem;"></div>
            
            <div class="receipt-line"></div>
            
            <div class="total-row" id="r-total"></div>
            
            <div style="margin-top: 20px;">
                <small><strong>NOTES:</strong></small><br>
                <small id="r-notes" style="font-style: italic;"></small>
            </div>
        </div>

        <a href="index.html" class="back-btn">Order Another?</a>
    </div>

    <script>
        // Retrieve data from LocalStorage (set by the main page)
        const lastOrder = JSON.parse(localStorage.getItem('lastOrder'));

        if (lastOrder) {
            document.getElementById('r-date').textContent = lastOrder.date;
            document.getElementById('r-items').textContent = lastOrder.details;
            document.getElementById('r-total').textContent = `TOTAL: ${lastOrder.total}`;
            document.getElementById('r-notes').textContent = lastOrder.notes || "None";
        } else {
            document.body.innerHTML = "<h2>No order found.</h2><a href='index.html'>Go Back</a>";
        }
    </script>
</body>
</html>
